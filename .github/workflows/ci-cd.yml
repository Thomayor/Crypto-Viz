name: CI/CD Pipeline - Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/crypto-viz

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - name: analytics
            context: ./services/analytics
            dockerfile: ./services/analytics/Dockerfile
          - name: scraper
            context: ./services/scraper
            dockerfile: ./services/scraper/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase repository owner
        id: lowercase
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.lowercase.outputs.owner }}/crypto-viz-${{ matrix.service.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.lowercase.outputs.owner }}/crypto-viz-${{ matrix.service.name }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.lowercase.outputs.owner }}/crypto-viz-${{ matrix.service.name }}:buildcache,mode=max

  deploy:
    name: Deploy to Oracle VM
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase repository owner
        id: lowercase
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Create .env.production on VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            mkdir -p ~/crypto-viz
            cd ~/crypto-viz

            # Create .env file with production values
            cat > .env << 'EOF'
            COINMARKETCAP_API_KEY=${{ secrets.COINMARKETCAP_API_KEY }}
            NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}
            REDDIT_CLIENT_ID=${{ secrets.REDDIT_CLIENT_ID }}
            REDDIT_CLIENT_SECRET=${{ secrets.REDDIT_CLIENT_SECRET }}
            REDDIT_USER_AGENT=CryptoViz/1.0
            KAFKA_BOOTSTRAP_SERVERS=kafka:29092
            KAFKA_AUTO_OFFSET_RESET=latest
            KAFKA_GROUP_ID=crypto-viz-consumers
            KAFKA_BATCH_SIZE=16384
            KAFKA_LINGER_MS=10
            SPARK_MASTER_URL=spark://spark-master:7077
            SPARK_EXECUTOR_MEMORY=1g
            SPARK_EXECUTOR_CORES=1
            SPARK_MAX_CORES=4
            OLLAMA_URL=http://ollama:11434
            OLLAMA_MODEL=gemma3:4b
            OLLAMA_TIMEOUT=30
            OLLAMA_TEMPERATURE=0.1
            OLLAMA_MAX_TOKENS=100
            DUCKDB_PATH=/app/data/crypto_analytics.db
            DUCKDB_MEMORY_LIMIT=2GB
            DUCKDB_THREADS=4
            SCRAPER_INTERVAL=120
            SCRAPER_BATCH_SIZE=100
            SCRAPER_MAX_RETRIES=3
            SCRAPER_TIMEOUT=10
            CRYPTO_SYMBOLS=bitcoin,ethereum,cardano,solana,polkadot,chainlink,litecoin,ripple
            ANALYTICS_INTERVAL=60
            SENTIMENT_BATCH_SIZE=10
            CACHE_TTL=300
            BACKEND_HOST=0.0.0.0
            BACKEND_PORT=8000
            CORS_ORIGINS=http://${{ secrets.VM_HOST }}:3000,http://${{ secrets.VM_HOST }}
            LOG_LEVEL=INFO
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            JWT_ALGORITHM=HS256
            JWT_EXPIRE_MINUTES=60
            VUE_APP_BACKEND_URL=http://${{ secrets.VM_HOST }}:8000
            VUE_APP_WEBSOCKET_URL=ws://${{ secrets.VM_HOST }}:8000/ws
            ENABLE_METRICS=true
            METRICS_PORT=9090
            MAX_MEMORY_USAGE=4GB
            MAX_CPU_USAGE=2
            DEBUG=false
            RELOAD=false
            WORKERS=2
            EOF

      - name: Copy docker-compose.yml to VM
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker-compose.yml,kafka-config.yml"
          target: ~/crypto-viz/
          strip_components: 0

      - name: Deploy services on VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 20m
          script: |
            cd ~/crypto-viz

            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Update docker-compose.yml to use ghcr.io images
            sed -i 's|build:|# build:|g' docker-compose.yml
            sed -i 's|context:|# context:|g' docker-compose.yml
            sed -i 's|dockerfile:|# dockerfile:|g' docker-compose.yml

            # Add image references for custom services (lowercase)
            sed -i '/container_name: crypto-viz-backend/a\    image: ghcr.io/${{ steps.lowercase.outputs.owner }}/crypto-viz-backend:latest' docker-compose.yml
            sed -i '/container_name: crypto-viz-frontend/a\    image: ghcr.io/${{ steps.lowercase.outputs.owner }}/crypto-viz-frontend:latest' docker-compose.yml
            sed -i '/container_name: crypto-viz-analytics-builder/a\    image: ghcr.io/${{ steps.lowercase.outputs.owner }}/crypto-viz-analytics:latest' docker-compose.yml
            sed -i '/container_name: crypto-viz-web-scraper/a\    image: ghcr.io/${{ steps.lowercase.outputs.owner }}/crypto-viz-scraper:latest' docker-compose.yml

            # Pull latest images
            docker-compose pull

            # Stop and remove old containers
            docker-compose down

            # Start services with new images
            docker-compose up -d

            # Show status
            echo "Waiting for services to start..."
            sleep 30
            docker-compose ps

            # Cleanup old images
            docker image prune -af

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/crypto-viz

            echo "=== Service Status ==="
            docker-compose ps

            echo ""
            echo "=== Health Checks ==="

            # Check backend
            sleep 10
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ Backend: healthy"
            else
              echo "❌ Backend: unhealthy"
            fi

            # Check frontend
            if curl -f http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Frontend: healthy"
            else
              echo "❌ Frontend: unhealthy"
            fi

            echo ""
            echo "=== Application URLs ==="
            echo "Frontend: http://${{ secrets.VM_HOST }}:3000"
            echo "Backend API: http://${{ secrets.VM_HOST }}:8000"
            echo "API Docs: http://${{ secrets.VM_HOST }}:8000/docs"
            echo "Kafka UI: http://${{ secrets.VM_HOST }}:8085"
            echo "Spark UI: http://${{ secrets.VM_HOST }}:8082"
